name: CI

on: [push, pull_request]

env:
  CC: clang
  CXX: clang++
  HEX_CDN: https://repo.hex.pm
  MIX_ENV: test
  WARNINGS_AS_ERRORS: true

jobs:
  test:
    name: Test (${{ matrix.label }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: OTP 29
            elixir: 1.20.0-rc.4
            otp: 29.0-rc3
            rebar3: 3.27.0
            elp: 2026-02-27
            elp_eqwalize_all_opts: "--project .eqwalizer-rebar-manifest.json --as test --stats --list-modules --bail-on-error"
            elp_manifest_otp_lib_dir: "/__elp_otp_28_embedded_stubs__"
            setup_beam_tools: false
            manual_bootstrap: true
            lint: true

          - label: OTP 28
            elixir: 1.19.4
            otp: 28.3
            rebar3: 3.27.0
            elp: 2026-02-27
            elp_eqwalize_all_opts: "--project .eqwalizer-rebar-manifest.json --as test --stats --list-modules --bail-on-error"
            elp_manifest_otp_lib_dir: ""
            setup_beam_tools: true
            manual_bootstrap: false
            lint: true

    steps:
      - uses: actions/checkout@v5

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          rebar3-version: ${{ matrix.rebar3 }}
          version-type: strict
          install-hex: ${{ matrix.setup_beam_tools }}
          install-rebar: ${{ matrix.setup_beam_tools }}

      - name: (Elixir) Install OTP 29 Bootstrap Tools
        if: ${{ matrix.manual_bootstrap }}
        run: |
          curl -fsSLO https://builds.hex.pm/installs/1.19.0/hex-2.4.2-otp-28.ez
          mix archive.install ./hex-2.4.2-otp-28.ez --force
          mix local.rebar rebar3 "$(command -v rebar3)" --force

      # - name: (Erlang) Check Formatting
      #   if: ${{ matrix.lint }}
      #   run: |
      #     clang-format --version
      #     make lint-format

      - name: (Erlang) Compile Test Profile
        run: rebar3 as test compile

      - name: (Erlang) Generate eqWAlizer Manifest
        if: ${{ matrix.lint }}
        run: |
          rebar3 as test experimental manifest --format json --to .eqwalizer-rebar-manifest.json
          if [ -n "${{ matrix.elp_manifest_otp_lib_dir }}" ]; then
            # ELP 2026-02-27 is built against OTP 28; avoid parsing OTP 29 stdlib types.
            jq --arg otp_lib_dir "${{ matrix.elp_manifest_otp_lib_dir }}" \
              '.otp_lib_dir = $otp_lib_dir' \
              .eqwalizer-rebar-manifest.json > .eqwalizer-rebar-manifest.elp.json
            mv .eqwalizer-rebar-manifest.elp.json .eqwalizer-rebar-manifest.json
          fi

      - name: (Erlang) eqWAlizer
        if: ${{ matrix.lint }}
        run: |
          make eqwalize-all ELP_VERSION=${{ matrix.elp }} ELP_EQWALIZE_ALL_OPTS="${{ matrix.elp_eqwalize_all_opts }}"

      - name: (Erlang) Dialyzer
        if: ${{ matrix.lint }}
        run: make lint-dialyzer

      - name: (Erlang) Xref
        if: ${{ matrix.lint }}
        run: make lint-xref

      - name: (Erlang) Tests
        run: rebar3 as test ct

      - name: (Elixir) Retrieve Mix Dependencies Cache
        uses: actions/cache@v4
        id: mix-cache
        with:
          path: deps
          key: ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}

      - name: (Elixir) Install Mix Dependencies
        run: |
          mix deps.get

      - name: (Elixir) Check Formatting
        if: ${{ matrix.lint }}
        run: mix format --check-formatted

      - name: (Elixir) Tests
        run: mix test --trace

      - name: Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ct-logs-${{ matrix.otp }}-${{ matrix.elixir }}
          path: _build/test/logs/
